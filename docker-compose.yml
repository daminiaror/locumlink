services:
  postgres:
    image: postgres:16-alpine
    container_name: l2_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: l2_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d l2_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - l2

  backend_1:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: l2_backend_1
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/l2_db?schema=public
      JWT_SECRET: local-dev-jwt-secret-minimum-32-characters
      ALLOWED_ORIGINS: http://localhost:3001,http://localhost
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./backend/tsconfig.build.json:/app/backend/tsconfig.build.json
      - ./backend/nest-cli.json:/app/backend/nest-cli.json
      - ./database/prisma:/app/database/prisma
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --schema=../database/prisma/schema.prisma &&
             npm run start:dev"
    networks:
      - l2

  backend_2:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: l2_backend_2
    restart: unless-stopped
    working_dir: /app/backend
    environment:
      NODE_ENV: staging
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/l2_db?schema=public
      JWT_SECRET: local-dev-jwt-secret-minimum-32-characters
      ALLOWED_ORIGINS: http://localhost:3001,http://localhost
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./backend/tsconfig.build.json:/app/backend/tsconfig.build.json
      - ./backend/nest-cli.json:/app/backend/nest-cli.json
      - ./database/prisma:/app/database/prisma
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy --schema=../database/prisma/schema.prisma &&
             npm run start:dev"
    networks:
      - l2

  nginx:
    image: nginx:1.27-alpine
    container_name: l2_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend_1
      - backend_2
    networks:
      - l2

networks:
  l2:
    driver: bridge

volumes:
  pgdata:
