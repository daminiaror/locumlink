# Cloud Build → Artifact Registry → Cloud Run
#
# Required substitution variables (set in Cloud Build trigger or CLI):
#   _REGION          e.g. northamerica-northeast1
#   _REPOSITORY      e.g. l2
#   _SERVICE         e.g. l2-backend
#   _CLOUD_SQL       optional Cloud SQL connection name (project:region:instance)
#
# Secrets must exist in Secret Manager before deploy (see scripts/deploy.sh).

substitutions:
  _REGION: northamerica-northeast1
  _REPOSITORY: l2
  _SERVICE: l2-backend
  _CLOUD_SQL: ""

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}

  - id: deploy-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=3000
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --allow-unauthenticated
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_ANON_KEY=SUPABASE_ANON_KEY:latest,SUPABASE_SERVICE_ROLE_KEY=SUPABASE_SERVICE_ROLE_KEY:latest,GCS_BUCKET_NAME=GCS_BUCKET_NAME:latest,GCS_PROJECT_ID=GCS_PROJECT_ID:latest,GCS_CREDENTIALS_JSON=GCS_CREDENTIALS_JSON:latest,ZEPTOMAIL_API_KEY=ZEPTOMAIL_API_KEY:latest,GOOGLE_ADMIN_CLIENT_ID=GOOGLE_ADMIN_CLIENT_ID:latest,GOOGLE_ADMIN_CLIENT_SECRET=GOOGLE_ADMIN_CLIENT_SECRET:latest,ADMIN_JWT_SECRET=ADMIN_JWT_SECRET:latest,VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest,VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest,VAPID_EMAIL=VAPID_EMAIL:latest
      - --set-env-vars=NODE_ENV=production,PORT=3000,ALLOWED_ORIGINS=https://your-frontend.example.com,MAIL_FROM_ADDRESS=noreply@locumconnect.ca,ADMIN_FRONTEND_REDIRECT_URL=https://your-frontend.example.com/admin

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
